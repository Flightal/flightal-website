name: Deploy to Loopia

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys on the same ref — prevents two pushes in quick
# succession from racing each other to the FTP server.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Least privilege — this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Kills a stuck FTP upload rather than burning the full 6-hour default.
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Loopia via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          protocol: ftps
          port: 21
          # Mirror dist/ to the server — wipes any orphaned files from
          # the previous deploy so the live tree exactly matches the build.
          dangerous-clean-slate: true
          log-level: standard
